name: Continuous Integration & Deployment

on:
  push:
    branches:
      - main
      - frontend
      - 'feature/**'
  pull_request:
    branches:
      - main
      - frontend

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-backend-${{ hashFiles('backend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-backend-

      - name: Install Dependencies
        run: bun install
        working-directory: backend

      - name: Generate Prisma Client
        run: bunx prisma generate
        working-directory: backend

      - name: Typecheck Backend
        run: bun run typecheck
        working-directory: backend

  engine:
    name: Engine CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-engine-${{ hashFiles('engine/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-engine-

      - name: Install Dependencies
        run: bun install
        working-directory: engine

      - name: Generate Prisma Client
        run: bunx prisma generate
        working-directory: engine

      - name: Typecheck Engine
        run: bun run typecheck
        working-directory: engine

      - name: Run Unit Tests
        run: bun run test
        working-directory: engine

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-frontend-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-frontend-

      - name: Install Dependencies
        run: bun install
        working-directory: frontend

      - name: Run ESLint Linter
        run: bun run lint
        working-directory: frontend
        # Note: Set to true because frontend currently has pre-existing lint errors. 
        # Change this to false once those lint issues are resolved to make linting blocking.
        continue-on-error: true

      - name: Build Frontend
        run: bun run build
        working-directory: frontend

  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend, engine, frontend]
    # Build & Push only on pushes/merges to main or frontend branches
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/frontend')

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cxe-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cxe-backend:${{ github.sha }}

      - name: Build and Push Engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: engine/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cxe-engine:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cxe-engine:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cxe-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cxe-frontend:${{ github.sha }}

  deploy:
    name: Deploy to Server via SSH
    runs-on: ubuntu-latest
    needs: docker-build-push
    # Deploy only on pushes/merges to main or frontend branches
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/frontend')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "docker-compose.yml"
          target: "~/cxe-deploy/"

      - name: Execute Remote Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            mkdir -p ~/cxe-deploy
            cd ~/cxe-deploy
            
            # Log in to Docker Hub inside the server
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            
            # Create/Update the .env file with secrets
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "DOCKER_IMAGE_PREFIX=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            
            # Pull the latest Docker images from Docker Hub
            docker compose pull
            
            # Restart the containers in daemon mode
            docker compose up -d --remove-orphans
            
            # Clean up old unused images to save disk space
            docker image prune -f
